
<svg width="1200" height="220" viewBox="0 0 1200 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="0">
      <stop offset="0%" stop-color="#0B101A"/>
      <stop offset="50%" stop-color="#451A87"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>

    <linearGradient id="textGradient" x1="420" y1="0" x2="780" y2="0">
      <stop offset="0%" stop-color="#EDE9FE"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>

    <style>
      .name {
        font: 700 42px Arial, sans-serif;
        fill: url(#textGradient);
      }

      .typing {
        font: 400 21px 'Fira Code', monospace;
        fill: #DBEAFE;
      }

      .cursor {
        animation: blink 0.8s infinite;
      }

      @keyframes blink {
        0%, 50% { opacity: 1; }
        51%, 100% { opacity: 0; }
      }

      .t1, .t2, .t3, .t4 {
        opacity: 0;
        animation: showText 12s infinite;
      }

      .t1 { animation-delay: 0s; }
      .t2 { animation-delay: 3s; }
      .t3 { animation-delay: 6s; }
      .t4 { animation-delay: 9s; }

      @keyframes showText {
        0%, 20% { opacity: 1; }
        25%, 100% { opacity: 0; }
      }
    </style>
  </defs>

  <rect width="1200" height="220" fill="url(#bg)"/>

  <!-- subtle low wave -->
  <path d="M0 180 C220 195 360 172 590 183 C820 194 980 173 1200 186 L1200 220 L0 220 Z" fill="white" fill-opacity="0.22"/>
  <path d="M0 194 C260 178 420 205 680 190 C900 178 1050 198 1200 182 L1200 220 L0 220 Z" fill="white" fill-opacity="0.35"/>

  <text x="600" y="82" text-anchor="middle" class="name">Pegah Salehi</text>

  <g text-anchor="middle">
    <text x="600" y="128" class="typing t1">Applied AI Engineer</text>
    <text x="600" y="128" class="typing t2">LLM &amp; RAG Applications Builder</text>
    <text x="600" y="128" class="typing t3">Generative AI Engineer</text>
    <text x="600" y="128" class="typing t4">Computer Vision Engineer</text>
    <text x="790" y="128" class="typing cursor">|</text>
  </g>
</svg>

